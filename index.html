<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Inventory Management System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      margin: 0;
      background: url('https://img.etimg.com/thumb/msid-114514502,width-1200,height-900,imgsize-51504,resizemode-8,quality-100/prime/economy-and-policy/warehousing-is-attracting-top-dollar-but-this-one-factor-is-hurting-developers-investors.jpg')
        center/cover no-repeat;
      color: white;
    }
    .section { display: none; padding: 40px; text-align: center; }
    .active { display: block; }
    .welcome-box, .form-box {
      background: rgba(0,0,0,0.7);
      padding: 30px;
      border-radius: 15px;
      max-width: 600px;
      margin: 40px auto;
    }
    .top-bar { display: flex; justify-content: flex-end; padding: 20px; }
    button {
      padding: 15px 30px;
      font-size: 1.1em;
      background: #27ae60;
      border: none; border-radius: 5px;
      color: white; cursor: pointer;
      margin: 10px;
    }
    button:hover { background: #1f8f4d; }
    input, select {
      width: 100%; padding: 10px; margin: 10px 0;
      border-radius: 5px; border: 1px solid #ddd;
    }
    table {
      width: 100%; margin-top: 20px; border-collapse: collapse;
      background: white; color: black;
    }
    th, td { padding: 10px; border: 1px solid #ccc; text-align: left; }
    .action-btn { background: #3498db; margin: 0 5px; }
    .action-btn:hover { background: #2980b9; }
    .dashboard-controls { margin-top: 20px; }
    .quote { font-style: italic; color: #ecf0f1; margin: 15px auto; max-width: 600px; border-left: 4px solid #27ae60; padding-left: 15px; }
  </style>
</head>
<body>

  <!-- Welcome Section -->
  <section class="section active" id="welcomeSection">
    <div class="top-bar">
      <button onclick="showSection('signupSection')">Sign In</button>
    </div>
    <div class="welcome-box">
      <h1>Welcome to Our Inventory Management System!</h1>
      <p>Manage your inventory effortlessly—track, add, and edit stock across any industry.</p>
      <button onclick="showSection('industrySection')">Get Started</button>
    </div>
  </section>

  <!-- Signup -->
  <section class="section" id="signupSection">
    <div class="form-box">
      <h1>Create Your Account</h1>
      <form id="signupForm">
        <input type="email" id="email" placeholder="Email" required />
        <input type="text" id="userid" placeholder="User ID" required />
        <input type="password" id="password" placeholder="Password" required />
        <select id="inventoryType" required>
          <option value="" disabled selected>Select Inventory Type</option>
          <option>Retail</option><option>Warehouse</option><option>Manufacturing</option>
          <option>Restaurants</option><option>E‑commerce</option><option>Healthcare</option>
          <option>Construction</option><option>Automotive</option><option>Electronics</option>
          <option>Bookstore</option>
        </select>
        <button type="submit">Create Account</button>
      </form>
      <button onclick="showSection('welcomeSection')">Back</button>
    </div>
  </section>

  <!-- Industry -->
  <section class="section" id="industrySection">
    <div class="form-box">
      <h1>Select Your Industry</h1>
      <select id="inventorySelect" required>
        <option value="" disabled selected>Choose Type</option>
        <option>Retail</option><option>Warehouse</option><option>Manufacturing</option>
        <option>Restaurants</option><option>E‑commerce</option><option>Healthcare</option>
        <option>Construction</option><option>Automotive</option><option>Electronics</option>
        <option>Bookstore</option>
      </select>
      <button onclick="showSection('loginSection')">Proceed</button>
      <button onclick="showSection('signupSection')">Back</button>
    </div>
  </section>

  <!-- Login -->
  <section class="section" id="loginSection">
    <div class="form-box">
      <h1>Login</h1>
      <form id="loginForm">
        <input type="text" id="loginUserId" placeholder="User ID" required />
        <input type="password" id="loginPassword" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
      <button onclick="showSection('industrySection')">Back</button>
    </div>
  </section>

  <!-- Dashboard -->
  <section class="section" id="dashboardSection">
    <div class="form-box">
      <h1>Inventory Dashboard</h1>
      <button onclick="toggleAddForm()">Add Product</button>
      <div id="addProductForm" style="display:none; text-align:left; margin-top:20px;">
        <input type="text" id="productName" placeholder="Product Name" />
        <input type="number" id="productPrice" placeholder="Price" />
        <input type="number" id="productStock" placeholder="Stock" />
        <button onclick="saveProduct()">Save</button>
      </div>
      <table id="productTable">
        <thead>
          <tr><th>Name</th><th>Price</th><th>Stock</th><th>Actions</th></tr>
        </thead>
        <tbody></tbody>
      </table>
      <div class="dashboard-controls">
        <button onclick="saveDetails()">Save Details</button>
        <button onclick="finish()">Finish</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </section>

  <script>
    let products = [];
    let editIndex = null;
    let currentUser = null;

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    // Signup
    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const data = {
        email: document.getElementById('email').value,
        userid: document.getElementById('userid').value,
        password: document.getElementById('password').value,
        inventoryType: document.getElementById('inventoryType').value
      };
      const res = await fetch('http://localhost:3000/signup', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      alert(result.message);
      if(res.ok) showSection('industrySection');
    });

    // Login
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      const data = {
        userid: document.getElementById('loginUserId').value,
        password: document.getElementById('loginPassword').value
      };
      const res = await fetch('http://localhost:3000/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(data)
      });
      const result = await res.json();
      if(res.ok) {
        currentUser = result.user;
        products = result.user.products || [];
        renderTable();
        showSection('dashboardSection');
      } else {
        alert(result.message);
      }
    });

    function logout() {
      showSection('welcomeSection');
      products = [];
      renderTable();
      document.getElementById('addProductForm').style.display = 'none';
      currentUser = null;
    }

    function toggleAddForm() {
      const f = document.getElementById('addProductForm');
      f.style.display = f.style.display === 'none' ? 'block' : 'none';
      editIndex = null;
      clearForm();
    }

    async function saveProduct() {
      const name = document.getElementById('productName').value.trim();
      const price = parseFloat(document.getElementById('productPrice').value);
      const stock = parseInt(document.getElementById('productStock').value);
      if (!name || isNaN(price) || isNaN(stock)) {
        return alert('Please fill in all fields.');
      }
      if(editIndex === null) {
        products.push({ name, price, stock });
      } else {
        products[editIndex] = { name, price, stock };
      }
      clearForm();
      renderTable();
      document.getElementById('addProductForm').style.display = 'none';
      await saveDetails();
    }

    function clearForm() {
      document.getElementById('productName').value = '';
      document.getElementById('productPrice').value = '';
      document.getElementById('productStock').value = '';
    }

    function renderTable() {
      const tbody = document.querySelector('#productTable tbody');
      tbody.innerHTML = '';
      products.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${p.name}</td>
          <td>${p.price}</td>
          <td>${p.stock}</td>
          <td>
            <button class="action-btn" onclick="startEdit(${i})">Edit</button>
            <button class="action-btn" onclick="deleteProduct(${i})">Delete</button>
          </td>`;
        tbody.appendChild(tr);
      });
    }

    function startEdit(i) {
      editIndex = i;
      const p = products[i];
      document.getElementById('productName').value = p.name;
      document.getElementById('productPrice').value = p.price;
      document.getElementById('productStock').value = p.stock;
      document.getElementById('addProductForm').style.display = 'block';
    }

    function deleteProduct(i) {
      products.splice(i, 1);
      renderTable();
      saveDetails();
    }

    async function saveDetails() {
      if(!currentUser) return;
      await fetch('http://localhost:3000/products', {
        method:'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({userid: currentUser.userid, products})
      });
    }

    async function finish() {
      await saveDetails();
      alert('Session finished. Thank you!');
      logout();
    }

  </script>
</body>
</html>
